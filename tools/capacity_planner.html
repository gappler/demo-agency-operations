<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capacity Planner — Sidebar Creative</title>
<style>
/* Reset & Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5;
  color: #222;
  min-width: 1200px;
}

/* Header */
.header {
  background: #1a1a1a;
  color: #fff;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: baseline; gap: 18px; }
.header-brand { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
.header-title { font-size: .95rem; font-weight: 400; color: #aaa; }
.header-date { font-size: .85rem; color: #777; }

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 18px 28px;
}
.stat-card {
  background: #fff;
  border-radius: 6px;
  padding: 16px 20px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; color: #777; margin-bottom: 4px; }
.stat-value { font-size: 1.6rem; font-weight: 700; }
.stat-value.red { color: #dc3545; }
.stat-value.green { color: #28a745; }
.stat-value.blue { color: #007bff; }

/* Layout */
.layout {
  display: flex;
  gap: 14px;
  padding: 0 28px 28px;
}
.main-content {
  flex: 3;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}
.sidebar {
  flex: 0 0 260px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Panel */
.panel {
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  overflow: hidden;
}
.panel-header {
  background: #1a1a1a;
  color: #fff;
  padding: 10px 16px;
  font-size: .85rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.panel-header-title { flex: 1; }
.panel-body {
  padding: 16px;
}

/* Forecast table */
.forecast-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.forecast-table th {
  padding: 6px 10px;
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: #777;
  border-bottom: 1px solid #eee;
}
.forecast-table th.month-col {
  text-align: center;
  min-width: 100px;
}
.forecast-table td {
  padding: 5px 10px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: middle;
}
.forecast-table td.month-cell {
  text-align: center;
}
.forecast-table tr:last-child td { border-bottom: 0; }
.dept-label { font-weight: 600; font-size: 13px; }
.dept-sublabel { font-size: 11px; color: #888; margin-top: 1px; }
.dept-row { cursor: pointer; }
.dept-row:hover td { background: #fafafa; }

.capacity-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.capacity-bar-bg {
  flex: 1;
  height: 8px;
  background: #eee;
  border-radius: 4px;
  overflow: hidden;
  max-width: 120px;
}
.capacity-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .3s;
}
.capacity-pct { font-size: 12px; font-weight: 700; min-width: 38px; }
.capacity-label { font-size: 11px; color: #888; }

/* Person sub-rows */
.person-subrow td {
  background: #fafafa;
  padding: 4px 10px 4px 24px;
  border-bottom: 1px solid #f5f5f5;
  font-size: 12px;
}
.person-subrow:last-child td { border-bottom: 1px solid #f0f0f0; }
.person-name-small { color: #444; }
.person-role-small { font-size: 10px; color: #aaa; }

/* Month header row */
.month-header-row th {
  background: #f5f5f5;
  color: #555;
  padding: 4px 10px;
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: 1px solid #e0e0e0;
}
.month-header-row th:first-child { text-align: left; }

/* Timeline tag */
.timeline-tag { font-size: 11px; font-weight: 600; }

/* Projects panel */
.projects-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.projects-table th {
  padding: 6px 10px;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: #777;
  border-bottom: 1px solid #eee;
  text-align: left;
}
.projects-table th.center { text-align: center; }
.projects-table td {
  padding: 7px 10px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: middle;
}
.projects-table tr:last-child td { border-bottom: 0; }
.project-name { font-weight: 600; }
.project-meta-small { font-size: 11px; color: #888; margin-top: 1px; }
.health-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; vertical-align: middle; }
.hours-cell { text-align: center; font-weight: 600; font-size: 13px; }
.hours-zero { color: #ccc; font-size: 12px; }
.risk-badge {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 600;
  margin-left: 4px;
}
.risk-badge.removed { background: #fff3f3; color: #dc3545; }
.risk-badge.increased { background: #f0fff4; color: #28a745; }

/* Risks panel */
.risk-item {
  padding: 12px 0;
  border-bottom: 1px solid #f0f0f0;
}
.risk-item:last-child { border-bottom: 0; }
.risk-item-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.risk-name { font-weight: 600; font-size: 13px; }
.risk-value { font-size: 11px; color: #888; }
.risk-desc { font-size: 12px; color: #666; margin-bottom: 8px; line-height: 1.4; }
.risk-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.risk-toggle-label { font-size: 11px; color: #888; }
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
}
.toggle-switch input { display: none; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #ccc;
  border-radius: 20px;
  transition: background .2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  height: 14px; width: 14px;
  left: 3px; bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform .2s;
}
.toggle-switch input:checked + .toggle-slider { background: #dc3545; }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(16px); }
.toggle-switch.green input:checked + .toggle-slider { background: #28a745; }

/* Hypothetical projects */
.hypo-add-btn {
  width: 100%;
  padding: 8px;
  border: 1px dashed #ccc;
  background: transparent;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  color: #888;
  margin-top: 12px;
  transition: border-color .15s, color .15s;
}
.hypo-add-btn:hover { border-color: #007bff; color: #007bff; }

.hypo-form {
  background: #f8f9ff;
  border: 1px solid #d0d8ff;
  border-radius: 6px;
  padding: 12px;
  margin-top: 12px;
}
.hypo-form label { display: block; font-size: 11px; color: #555; margin-bottom: 3px; margin-top: 8px; font-weight: 600; }
.hypo-form label:first-child { margin-top: 0; }
.hypo-form input, .hypo-form select {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
  outline: none;
}
.hypo-form input:focus, .hypo-form select:focus { border-color: #007bff; }
.hypo-hours-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-top: 4px;
}
.hypo-hours-grid label { margin: 0; }
.hypo-hours-grid input { margin-top: 2px; }
.hypo-form-actions { display: flex; gap: 6px; margin-top: 10px; }
.hypo-btn {
  flex: 1;
  padding: 6px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  font-weight: 600;
}
.hypo-btn.add { background: #007bff; color: #fff; }
.hypo-btn.add:hover { background: #0069d9; }
.hypo-btn.cancel { background: #eee; color: #555; }
.hypo-btn.cancel:hover { background: #ddd; }

.hypo-item {
  background: #f0f4ff;
  border: 1px solid #c0d0ff;
  border-radius: 4px;
  padding: 8px 10px;
  margin-top: 8px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.hypo-item-name { font-weight: 600; font-size: 12px; color: #007bff; }
.hypo-item-detail { font-size: 11px; color: #666; margin-top: 2px; }
.hypo-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: #aaa;
  font-size: 14px;
  line-height: 1;
  padding: 0;
  flex-shrink: 0;
}
.hypo-remove:hover { color: #dc3545; }

/* Signals */
.signals-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #777; margin-top: 16px; margin-bottom: 8px; }
.signal { font-size: 12px; padding: 4px 0; display: flex; align-items: center; gap: 6px; }
.signal .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.signal.red .dot { background: #dc3545; }
.signal.green .dot { background: #28a745; }
.signal.red { color: #dc3545; }
.signal.green { color: #28a745; }
.section-label td { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #999; padding: 10px 10px 4px !important; border-bottom: none !important; }

/* Net change indicator */
.net-positive { color: #28a745; }
.net-negative { color: #dc3545; }
.net-neutral { color: #555; }

/* Expand caret */
.caret {
  display: inline-block;
  font-size: 10px;
  margin-right: 4px;
  transition: transform .2s;
  color: #aaa;
}
.caret.open { transform: rotate(90deg); }
</style>
</head>

// ── UTILITY & FORECAST FUNCTIONS ─────────────────────────────────────────────

function getProjectMonthMultiplier(project, month) {
  if (!project.endMonth || project.endMonth === 'jul+') return 1;
  const monthIndex = MONTHS.indexOf(month);
  const endIndex = MONTHS.indexOf(project.endMonth);
  if (endIndex === -1) return 1;
  if (monthIndex < endIndex) return 1;
  if (monthIndex === endIndex) return project.endsHalf ? 0.5 : 1;
  return 0;
}

function getProjectDeptMonthHours(projectId, dept, month) {
  const project = PROJECTS.find(p => p.id === projectId);
  const mult = getProjectMonthMultiplier(project, month);
  if (mult === 0) return 0;
  let total = 0;
  const projAllocs = allocations[projectId] || {};
  for (const personId in projAllocs) {
    const person = TEAM.find(t => t.id === personId);
    if (person && person.dept === dept) total += projAllocs[personId] * WEEK_MONTH_FACTOR;
  }
  return Math.round(total * mult);
}

function getDeptMonthDemand(dept, month) {
  let total = 0;
  PROJECTS.forEach(p => { total += getProjectDeptMonthHours(p.id, dept, month); });
  total += getRiskAdjustment(dept, month);
  hypotheticalProjects.forEach(hp => { total += (hp.hours[month] && hp.hours[month][dept]) || 0; });
  return Math.round(total);
}

function getDeptCapacity(dept) {
  return Math.round(TEAM.filter(t => t.dept === dept).reduce((sum, t) => sum + t.billableTarget * WEEK_MONTH_FACTOR, 0));
}

function getCapacityColor(pct) {
  if (pct > 100) return '#dc3545';
  if (pct >= 90) return '#ffc107';
  if (pct >= 70) return '#555';
  return '#28a745';
}

function getCapacityLabel(pct) {
  if (pct > 100) return 'Bottleneck';
  if (pct >= 90) return 'Tight';
  if (pct >= 70) return 'Normal';
  return 'Bench time';
}

function formatMoney(n) { return n >= 1000 ? '$' + Math.round(n / 1000) + 'K' : '$' + n; }

function getRiskAdjustment(dept, month) {
  let adj = 0;
  if (riskToggles.velloChurns && (month === 'may' || month === 'jun')) {
    const va = allocations['vello'] || {};
    for (const pid in va) { const p = TEAM.find(t => t.id === pid); if (p && p.dept === dept) adj -= va[pid] * WEEK_MONTH_FACTOR; }
  }
  if (riskToggles.kovaDownsizes && month === 'jun') {
    const ka = allocations['kova'] || {};
    for (const pid in ka) { const p = TEAM.find(t => t.id === pid); if (p && p.dept === dept) adj -= Math.round(ka[pid] * WEEK_MONTH_FACTOR * 0.3); }
  }
  if (riskToggles.summitExpands && (month === 'may' || month === 'jun')) {
    const sa = allocations['summit'] || {};
    for (const pid in sa) { const p = TEAM.find(t => t.id === pid); if (p && p.dept === dept) adj += Math.round(sa[pid] * WEEK_MONTH_FACTOR * 0.55); }
  }
  return Math.round(adj);
}

function getPersonMonthDemand(personId, month) {
  let total = 0;
  PROJECTS.forEach(proj => {
    const mult = getProjectMonthMultiplier(proj, month);
    const hrs = (allocations[proj.id] && allocations[proj.id][personId]) || 0;
    total += hrs * WEEK_MONTH_FACTOR * mult;
  });
  total += getPersonRiskAdjustment(personId, month);
  return Math.round(total);
}

function getPersonRiskAdjustment(personId, month) {
  let adj = 0;
  if (riskToggles.velloChurns && (month === 'may' || month === 'jun'))
    adj -= ((allocations['vello'] && allocations['vello'][personId]) || 0) * WEEK_MONTH_FACTOR;
  if (riskToggles.kovaDownsizes && month === 'jun')
    adj -= Math.round(((allocations['kova'] && allocations['kova'][personId]) || 0) * WEEK_MONTH_FACTOR * 0.3);
  if (riskToggles.summitExpands && (month === 'may' || month === 'jun'))
    adj += Math.round(((allocations['summit'] && allocations['summit'][personId]) || 0) * WEEK_MONTH_FACTOR * 0.55);
  return adj;
}

function getProjectMonthTotal(projectId, month, ignoreRisks) {
  const project = PROJECTS.find(p => p.id === projectId);
  const mult = getProjectMonthMultiplier(project, month);
  if (mult === 0) return 0;
  let total = 0;
  const pa = allocations[projectId] || {};
  for (const pid in pa) total += pa[pid] * WEEK_MONTH_FACTOR;
  total = Math.round(total * mult);
  if (!ignoreRisks) total += getProjectRiskAdjustment(projectId, month);
  return Math.max(0, Math.round(total));
}

function getProjectRiskAdjustment(projectId, month) {
  let adj = 0;
  if (projectId === 'vello' && riskToggles.velloChurns && (month === 'may' || month === 'jun')) {
    const pa = allocations['vello'] || {};
    for (const pid in pa) adj -= pa[pid] * WEEK_MONTH_FACTOR;
  }
  if (projectId === 'kova' && riskToggles.kovaDownsizes && month === 'jun') {
    const pa = allocations['kova'] || {};
    for (const pid in pa) adj -= Math.round(pa[pid] * WEEK_MONTH_FACTOR * 0.3);
  }
  if (projectId === 'summit' && riskToggles.summitExpands && (month === 'may' || month === 'jun')) {
    const pa = allocations['summit'] || {};
    for (const pid in pa) adj += Math.round(pa[pid] * WEEK_MONTH_FACTOR * 0.55);
  }
  return Math.round(adj);
}

function isProjectRiskAffected(projectId, month) {
  if (projectId === 'vello' && riskToggles.velloChurns && (month === 'may' || month === 'jun')) return 'removed';
  if (projectId === 'kova' && riskToggles.kovaDownsizes && month === 'jun') return 'removed';
  if (projectId === 'summit' && riskToggles.summitExpands && (month === 'may' || month === 'jun')) return 'increased';
  return false;
}

function getTimelineTag(proj) {
  if (proj.type === 'retainer') return '<span class="timeline-tag" style="color:#888;">Ongoing</span>';
  if (proj.endMonth === 'apr') return '<span class="timeline-tag" style="color:#dc3545;">Ends Apr</span>';
  if (proj.endMonth === 'may') return '<span class="timeline-tag" style="color:#ffc107;">Ends May</span>';
  if (proj.endMonth === 'jun') return '<span class="timeline-tag" style="color:#28a745;">Ends Jun</span>';
  return '<span class="timeline-tag" style="color:#888;">Through Jul+</span>';
}

let hypotheticalProjects = [];
let riskToggles = { velloChurns: false, kovaDownsizes: false, summitExpands: false };
let expandedDept = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────

function toggleExpand(dept) {
  expandedDept = expandedDept === dept ? null : dept;
  renderAll();
}

function toggleRisk(riskKey) {
  riskToggles[riskKey] = !riskToggles[riskKey];
  renderAll();
}

let hypoFormVisible = false;

function showHypoForm() {
  hypoFormVisible = true;
  renderProjects();
}

function hideHypoForm() {
  hypoFormVisible = false;
  renderProjects();
}

function addHypotheticalProject() {
  const nameEl = document.getElementById('hypoName');
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) return;
  const hours = {};
  MONTHS.forEach(m => {
    hours[m] = {};
    DEPTS.forEach(d => {
      const el = document.getElementById('hypo_' + m + '_' + d);
      const v = el ? parseInt(el.value) || 0 : 0;
      if (v > 0) hours[m][d] = v;
    });
  });
  hypotheticalProjects.push({ name, hours });
  hypoFormVisible = false;
  renderAll();
}

function removeHypotheticalProject(idx) {
  hypotheticalProjects.splice(idx, 1);
  renderAll();
}

// ── RENDER FUNCTIONS ─────────────────────────────────────────────────────────

function renderForecast() {
  const el = document.getElementById('forecastBody');
  let html = '<table class="forecast-table">';
  // Header
  html += '<tr class="month-header-row"><th>Department</th>';
  MONTHS.forEach(m => { html += '<th class="month-col">' + MONTH_LABELS[m] + '</th>'; });
  html += '</tr>';

  DEPTS.forEach(dept => {
    const cap = getDeptCapacity(dept);
    const staff = TEAM.filter(t => t.dept === dept).length;
    const isExpanded = expandedDept === dept;
    const caretClass = isExpanded ? 'caret open' : 'caret';

    html += '<tr class="dept-row" onclick="toggleExpand(\'' + dept + '\')">';
    html += '<td><span class="' + caretClass + '">&#9654;</span><span class="dept-label">' + DEPT_LABELS[dept] + '</span><div class="dept-sublabel">' + staff + ' staff &middot; ' + cap + ' hrs/mo capacity</div></td>';

    MONTHS.forEach(m => {
      const demand = getDeptMonthDemand(dept, m);
      const pct = cap > 0 ? Math.round((demand / cap) * 100) : 0;
      const color = getCapacityColor(pct);
      const label = getCapacityLabel(pct);
      const fillW = Math.min(pct, 150);
      html += '<td class="month-cell"><div class="capacity-bar-wrap">';
      html += '<div class="capacity-bar-bg"><div class="capacity-bar-fill" style="width:' + fillW + '%;background:' + color + ';"></div></div>';
      html += '<span class="capacity-pct" style="color:' + color + ';">' + pct + '%</span>';
      html += '<span class="capacity-label">' + label + '</span>';
      html += '</div></td>';
    });
    html += '</tr>';

    // Person sub-rows when expanded
    if (isExpanded) {
      const people = TEAM.filter(t => t.dept === dept);
      people.forEach(person => {
        html += '<tr class="person-subrow"><td><span class="person-name-small">' + person.name + '</span><br><span class="person-role-small">' + person.role + '</span></td>';
        MONTHS.forEach(m => {
          const demand = getPersonMonthDemand(person.id, m);
          const personCap = Math.round(person.billableTarget * WEEK_MONTH_FACTOR);
          const pct = personCap > 0 ? Math.round((demand / personCap) * 100) : 0;
          const color = getCapacityColor(pct);
          html += '<td class="month-cell"><div class="capacity-bar-wrap">';
          html += '<div class="capacity-bar-bg"><div class="capacity-bar-fill" style="width:' + Math.min(pct, 150) + '%;background:' + color + ';"></div></div>';
          html += '<span class="capacity-pct" style="color:' + color + ';">' + pct + '%</span>';
          html += '</div></td>';
        });
        html += '</tr>';
      });
    }
  });

  html += '</table>';

  // Hiring signals
  const signals = [];
  DEPTS.forEach(dept => {
    const cap = getDeptCapacity(dept);
    MONTHS.forEach(m => {
      const demand = getDeptMonthDemand(dept, m);
      const pct = cap > 0 ? Math.round((demand / cap) * 100) : 0;
      if (pct > 100) signals.push({ type: 'red', text: DEPT_LABELS[dept] + ' is at ' + pct + '% in ' + MONTH_LABELS[m] + ' — over capacity' });
      else if (pct < 60) signals.push({ type: 'green', text: DEPT_LABELS[dept] + ' is at ' + pct + '% in ' + MONTH_LABELS[m] + ' — bench available' });
    });
  });
  if (signals.length) {
    html += '<div class="signals-title">Hiring Signals</div>';
    signals.forEach(s => {
      html += '<div class="signal ' + s.type + '"><span class="dot"></span>' + s.text + '</div>';
    });
  }

  el.innerHTML = html;
}

function renderProjects() {
  const el = document.getElementById('projectsBody');
  let html = '<table class="projects-table">';
  html += '<tr class="month-header-row"><th>Project</th>';
  MONTHS.forEach(m => { html += '<th class="center">' + MONTH_LABELS[m] + '</th>'; });
  html += '</tr>';

  const retainers = PROJECTS.filter(p => p.type === 'retainer');
  const projects = PROJECTS.filter(p => p.type === 'project');

  // Retainer section
  html += '<tr class="section-label"><td colspan="4">Retainer Clients</td></tr>';
  retainers.forEach(proj => {
    html += renderProjectRow(proj);
  });

  // Project section
  html += '<tr class="section-label"><td colspan="4">Project-Based</td></tr>';
  projects.forEach(proj => {
    html += renderProjectRow(proj);
  });

  html += '</table>';

  // Hypothetical projects UI
  if (!hypoFormVisible) {
    html += '<button class="hypo-add-btn" onclick="showHypoForm()">+ New Hypothetical Project</button>';
  } else {
    html += '<div class="hypo-form">';
    html += '<label>Project Name</label>';
    html += '<input type="text" id="hypoName" placeholder="e.g. Acme Corp Campaign">';
    MONTHS.forEach(m => {
      html += '<label>' + MONTH_LABELS[m] + ' Hours by Department</label>';
      html += '<div class="hypo-hours-grid">';
      DEPTS.forEach(d => {
        html += '<div><label>' + DEPT_LABELS[d] + '</label><input type="number" id="hypo_' + m + '_' + d + '" min="0" value="0" placeholder="0"></div>';
      });
      html += '</div>';
    });
    html += '<div class="hypo-form-actions">';
    html += '<button class="hypo-btn add" onclick="addHypotheticalProject()">Add</button>';
    html += '<button class="hypo-btn cancel" onclick="hideHypoForm()">Cancel</button>';
    html += '</div></div>';
  }

  // Show existing hypothetical projects
  hypotheticalProjects.forEach((hp, idx) => {
    const totalHrs = MONTHS.reduce((sum, m) => {
      return sum + DEPTS.reduce((s, d) => s + ((hp.hours[m] && hp.hours[m][d]) || 0), 0);
    }, 0);
    html += '<div class="hypo-item"><div><div class="hypo-item-name">' + hp.name + '</div>';
    html += '<div class="hypo-item-detail">' + totalHrs + ' total hours across Q2</div></div>';
    html += '<button class="hypo-remove" onclick="removeHypotheticalProject(' + idx + ')">&times;</button></div>';
  });

  el.innerHTML = html;
}

function renderProjectRow(proj) {
  let html = '<tr>';
  html += '<td><div class="project-name"><span class="health-dot" style="background:' + HEALTH_COLORS[proj.health] + ';"></span> ' + proj.name + '</div>';
  html += '<div class="project-meta-small">' + formatMoney(proj.value) + '/mo ' + getTimelineTag(proj);
  if (proj.burned != null) html += ' &middot; ' + proj.burned + '% burned';
  if (proj.status) html += ' &middot; ' + proj.status;
  html += '</div></td>';

  MONTHS.forEach(m => {
    const hrs = getProjectMonthTotal(proj.id, m);
    const riskStatus = isProjectRiskAffected(proj.id, m);
    html += '<td class="hours-cell">';
    if (hrs === 0 && !riskStatus) {
      html += '<span class="hours-zero">&mdash;</span>';
    } else {
      html += hrs + 'h';
      if (riskStatus === 'removed') html += ' <span class="risk-badge removed">risk &minus;</span>';
      else if (riskStatus === 'increased') html += ' <span class="risk-badge increased">risk +</span>';
    }
    html += '</td>';
  });
  html += '</tr>';
  return html;
}

function renderRisks() {
  const el = document.getElementById('risksBody');
  const risks = [
    {
      key: 'velloChurns',
      name: 'Vello Churns',
      value: '-$32K/mo',
      desc: 'Vello Cycling has signaled dissatisfaction. If they leave, all Vello hours drop to zero starting May.',
      green: false
    },
    {
      key: 'kovaDownsizes',
      name: 'Kova Downsizes',
      value: '-30% hours',
      desc: 'Kova Skincare may reduce scope by 30% in June due to budget cuts.',
      green: false
    },
    {
      key: 'summitExpands',
      name: 'Summit Expands',
      value: '+55% hours',
      desc: 'Summit Pet Supply is considering expanding their retainer by 55% starting May.',
      green: true
    }
  ];

  let html = '';
  risks.forEach(risk => {
    const checked = riskToggles[risk.key] ? 'checked' : '';
    const switchClass = risk.green ? 'toggle-switch green' : 'toggle-switch';
    html += '<div class="risk-item">';
    html += '<div class="risk-item-header"><span class="risk-name">' + risk.name + '</span><span class="risk-value">' + risk.value + '</span></div>';
    html += '<div class="risk-desc">' + risk.desc + '</div>';
    html += '<div class="risk-toggle-row"><span class="risk-toggle-label">Model this scenario</span>';
    html += '<label class="' + switchClass + '"><input type="checkbox" ' + checked + ' onchange="toggleRisk(\'' + risk.key + '\')"><span class="toggle-slider"></span></label>';
    html += '</div></div>';
  });

  // Compact hiring signals
  const signals = [];
  DEPTS.forEach(dept => {
    const cap = getDeptCapacity(dept);
    MONTHS.forEach(m => {
      const demand = getDeptMonthDemand(dept, m);
      const pct = cap > 0 ? Math.round((demand / cap) * 100) : 0;
      if (pct > 100) signals.push({ type: 'red', text: DEPT_LABELS[dept] + ' ' + MONTH_LABELS[m] + ': ' + pct + '%' });
      else if (pct < 60) signals.push({ type: 'green', text: DEPT_LABELS[dept] + ' ' + MONTH_LABELS[m] + ': ' + pct + '%' });
    });
  });
  if (signals.length) {
    html += '<div class="signals-title" style="margin-top:12px;">Signals</div>';
    signals.forEach(s => {
      html += '<div class="signal ' + s.type + '"><span class="dot"></span>' + s.text + '</div>';
    });
  }

  el.innerHTML = html;
}

function updateStats() {
  let bottlenecks = 0, bench = 0, netChange = 0;
  DEPTS.forEach(dept => {
    const cap = getDeptCapacity(dept);
    MONTHS.forEach(m => {
      const demand = getDeptMonthDemand(dept, m);
      const pct = cap > 0 ? Math.round((demand / cap) * 100) : 0;
      if (pct > 100) bottlenecks++;
      if (pct < 70) bench++;
      netChange += getRiskAdjustment(dept, m);
    });
  });
  document.getElementById('statBottlenecks').textContent = bottlenecks;
  document.getElementById('statBench').textContent = bench;
  document.getElementById('statHypothetical').textContent = hypotheticalProjects.length;

  const netEl = document.getElementById('statNetChange');
  const sign = netChange > 0 ? '+' : '';
  netEl.textContent = sign + Math.round(netChange) + ' hrs';
  netEl.className = 'stat-value ' + (netChange > 0 ? 'net-positive' : netChange < 0 ? 'net-negative' : 'net-neutral');
}

function renderAll() { renderForecast(); renderProjects(); renderRisks(); updateStats(); }

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
renderAll();
