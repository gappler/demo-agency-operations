<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap' rel='stylesheet'>
<title>Performance Dashboard — Sidebar Creative</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Inter', sans-serif;
  background: #f5f5f5;
  color: #222;
  min-width: 900px;
}

/* Header */
.header {
  background: #1a1a1a;
  color: #fff;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: baseline; gap: 18px; }
.header-brand { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
.header-title { font-size: .95rem; font-weight: 400; color: #aaa; }
.header-date { font-size: .85rem; color: #777; }

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 18px 28px;
}
.stat-card {
  background: #fff;
  border-radius: 6px;
  padding: 16px 20px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; color: #777; margin-bottom: 4px; }
.stat-value { font-size: 1.6rem; font-weight: 700; color: #222; }

/* Overview Grid */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  padding: 0 28px 28px;
}
.client-card {
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  padding: 16px 20px;
  cursor: pointer;
  transition: box-shadow .15s;
  border-left: 4px solid #ccc;
}
.client-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.14); }
.client-card.health-green { border-left-color: #28a745; }
.client-card.health-yellow { border-left-color: #ffc107; }
.client-card.health-red { border-left-color: #dc3545; }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-name { font-size: 1rem; font-weight: 700; }
.card-retainer { font-size: .8rem; color: #777; margin-top: 2px; }
.card-health { font-size: .85rem; font-weight: 600; text-align: right; }
.card-health.green { color: #28a745; }
.card-health.yellow { color: #b8860b; }
.card-health.red { color: #dc3545; }
.card-trend { font-size: .78rem; margin-top: 4px; }
.card-trend.trend-up { color: #28a745; }
.card-trend.trend-down { color: #dc3545; }
.card-trend.trend-flat { color: #777; }

.sparkline-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}
.spark-cell {
  display: flex;
  align-items: center;
  gap: 6px;
}
.spark-label { font-size: .7rem; color: #777; min-width: 50px; }
.spark-value { font-size: .75rem; font-weight: 600; color: #333; margin-left: auto; }

/* Detail View */
#detail-view { display: none; padding: 0 28px 28px; }
.back-btn {
  display: inline-block;
  margin: 18px 0 12px;
  padding: 7px 16px;
  background: #1a1a1a;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: .85rem;
}
.back-btn:hover { background: #333; }

.detail-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.detail-name { font-size: 1.5rem; font-weight: 700; }
.detail-retainer { font-size: .95rem; color: #777; }
.detail-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: .8rem;
  font-weight: 600;
  color: #fff;
}
.detail-badge.green { background: #28a745; }
.detail-badge.yellow { background: #ffc107; color: #333; }
.detail-badge.red { background: #dc3545; }

.detail-section {
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  padding: 20px;
  margin-bottom: 16px;
}
.detail-section h3 { font-size: 1.05rem; margin-bottom: 12px; color: #333; }
.detail-section .spark-large { margin-bottom: 14px; }

table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .82rem;
}
table.data-table th {
  text-align: left;
  padding: 6px 10px;
  border-bottom: 2px solid #e0e0e0;
  font-weight: 600;
  color: #555;
  font-size: .75rem;
  text-transform: uppercase;
  letter-spacing: .04em;
}
table.data-table td {
  padding: 5px 10px;
  border-bottom: 1px solid #f0f0f0;
}
table.data-table tr:last-child td { border-bottom: none; }
.mom-pos { color: #28a745; font-weight: 600; }
.mom-neg { color: #dc3545; font-weight: 600; }
</style>

      CPL: [0, 0, 48.00, 42.00, 38.50, 35.00]
    },
    social: {
      Instagram: [2400, 3100, 4200, 5000, 5800, 6800],
      'Eng Rate %': [5.2, 5.5, 5.8, 5.4, 5.1, 5.0],
      TikTok: [800, 1200, 1800, 2400, 3000, 3800],
      'FB Reach': [4200, 5800, 8400, 9200, 10600, 12400],
      Events: [85, 120, 180, 95, 110, 145]
    },
    email: {
      'List Size': [1200, 1800, 2400, 3100, 3800, 4600],
      Sends: [2, 2, 3, 3, 3, 4],
      'Open Rate %': [32.0, 30.5, 29.8, 28.5, 27.2, 26.8],
      'Click Rate %': [5.5, 5.0, 4.8, 4.5, 4.2, 4.0],
      Revenue: [2800, 3400, 4200, 5100, 5800, 6500]
    },
    hours: {
      'SOW Hours': [0, 0, 77, 77, 77, 77],
      Delivered: [0, 0, 92, 88, 95, 82],
      'Util %': [0, 0, 119, 114, 123, 106],
      Budget: [0, 0, 12000, 12000, 12000, 12000],
      'Actual Cost': [0, 0, 14260, 13640, 14725, 12710]
    }
  }
];

// --- Utilities ---

function sparkline(data, width, height, color) {
  const padding = 2;
  const w = width - padding * 2;
  const h = height - padding * 2;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = padding + (i / (data.length - 1)) * w;
    const y = padding + h - ((v - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function sparkColor(data) {
  const first = data[0], last = data[data.length - 1];
  if (first === 0) return '#28a745';
  const pct = ((last - first) / first) * 100;
  if (pct > 2) return '#28a745';
  if (pct < -2) return '#dc3545';
  return '#555';
}

function getSparkData(client, metricLabel) {
  if (metricLabel === 'Sessions') {
    const d = client.traffic.Sessions;
    return client.preContract ? d.slice(2) : d;
  }
  if (metricLabel === 'MQLs') {
    const d = client.leads.MQLs;
    return client.preContract ? d.slice(2) : d;
  }
  if (metricLabel === 'Email Revenue') return client.email.Revenue;
  if (metricLabel === 'Hours Util %') {
    const d = client.hours['Util %'];
    return client.preContract ? d.slice(2) : d;
  }
  if (metricLabel === 'Subscriptions') return client.leads.Subscriptions;
  if (metricLabel === 'Instagram Followers' || metricLabel === 'Instagram') return client.social.Instagram;
  return [0,0,0,0,0,0];
}

function fmtNum(v) {
  if (typeof v === 'string') return v;
  if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
  if (v >= 1000) return (v / 1000).toFixed(v >= 10000 ? 0 : 1) + 'K';
  return v.toLocaleString();
}

function fmtDollar(v) {
  if (v >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + (v / 1000).toFixed(v >= 10000 ? 0 : 1) + 'K';
  return '$' + v.toLocaleString();
}

function healthEmoji(color) {
  if (color === 'green') return '\u2705';
  if (color === 'yellow') return '\u26a0\ufe0f';
  return '\u274c';
}

function trendText(data) {
  const first = data[0], last = data[data.length - 1];
  if (first === 0) return { text: '\u2191 Trending Up', cls: 'trend-up' };
  const pct = ((last - first) / first) * 100;
  if (pct > 15) return { text: '\u2191\u2191 Strong Growth', cls: 'trend-up' };
  if (pct > 5) return { text: '\u2191 Trending Up', cls: 'trend-up' };
  if (pct >= -5) return { text: '\u2192 Steady', cls: 'trend-flat' };
  if (pct >= -15) return { text: '\u2193 Declining', cls: 'trend-down' };
  return { text: '\u2193\u2193 Sharp Decline', cls: 'trend-down' };
}

function momChange(arr) {
  const feb = arr[4], mar = arr[5];
  if (typeof feb === 'string' || typeof mar === 'string') return { text: '\u2014', cls: '' };
  if (feb === 0) return { text: mar > 0 ? 'New' : '\u2014', cls: mar > 0 ? 'mom-pos' : '' };
  const pct = ((mar - feb) / Math.abs(feb)) * 100;
  const sign = pct >= 0 ? '+' : '';
  return { text: sign + pct.toFixed(1) + '%', cls: pct >= 0 ? 'mom-pos' : 'mom-neg' };
}

// --- Render ---

function init() {
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  // Compute stats
  const marchSessions = CLIENTS.map(c => c.traffic.Sessions[5]);
  const avgSessions = Math.round(marchSessions.reduce((a, b) => a + b, 0) / CLIENTS.length);

  const marchMQLs = [2280, 1180, 420, 560, 570, 430, 440, 105];
  const totalMQLs = marchMQLs.reduce((a, b) => a + b, 0);

  // Blended util: sum of delivered / sum of SOW for March (exclude 0-SOW)
  let totalDelivered = 0, totalSOW = 0;
  CLIENTS.forEach(c => {
    const sow = c.hours['SOW Hours'][5];
    const del = c.hours.Delivered[5];
    if (sow > 0) { totalSOW += sow; totalDelivered += del; }
  });
  const avgUtil = Math.round((totalDelivered / totalSOW) * 100);

  const statsHTML = [
    { label: 'Total Clients', value: '8' },
    { label: 'Avg Monthly Sessions', value: fmtNum(avgSessions) },
    { label: 'Portfolio MQLs', value: totalMQLs.toLocaleString() },
    { label: 'Avg SOW Utilization', value: avgUtil + '%' }
  ].map(s => `<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div></div>`).join('');
  document.getElementById('stats-row').innerHTML = statsHTML;

  // Sort by health descending
  const sorted = [...CLIENTS].sort((a, b) => b.health - a.health);

  const gridHTML = sorted.map(c => {
    const primaryData = getSparkData(c, c.sparkMetrics[0]);
    const trend = trendText(primaryData);

    const sparks = c.sparkMetrics.map(m => {
      const data = getSparkData(c, m);
      const color = sparkColor(data);
      const last = data[data.length - 1];
      const label = m.replace('Hours Util %', 'Util %').replace('Instagram Followers', 'IG Followers').replace('Email Revenue', 'Email Rev');
      const val = m.includes('Revenue') || m.includes('Rev') ? fmtDollar(last) : m.includes('Util') ? last + '%' : fmtNum(last);
      return `<div class="spark-cell"><span class="spark-label">${label}</span>${sparkline(data, 60, 20, color)}<span class="spark-value">${val}</span></div>`;
    }).join('');

    return `<div class="client-card health-${c.healthColor}" onclick="showDetail('${c.id}')">
      <div class="card-header">
        <div><div class="card-name">${c.name}</div><div class="card-retainer">${c.retainer}</div></div>
        <div><div class="card-health ${c.healthColor}">${c.health} ${healthEmoji(c.healthColor)}</div>
        <div class="card-trend ${trend.cls}">${trend.text}</div></div>
      </div>
      <div class="sparkline-grid">${sparks}</div>
    </div>`;
  }).join('');

  document.getElementById('overview-grid').innerHTML = gridHTML;
}

function showDetail(clientId) {
  const c = CLIENTS.find(cl => cl.id === clientId);
  if (!c) return;

  document.getElementById('overview-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'block';

  const primaryData = getSparkData(c, c.sparkMetrics[0]);
  const trend = trendText(primaryData);

  const sections = [
    { title: 'Website Traffic', data: c.traffic, primary: 'Sessions' },
    { title: 'Lead Generation', data: c.leads, primary: 'MQLs' },
    { title: 'Social Media', data: c.social, primary: 'Instagram' },
    { title: 'Email Marketing', data: c.email, primary: 'Revenue' },
    { title: 'Hours & Budget', data: c.hours, primary: 'Delivered' }
  ];

  const sectionsHTML = sections.map(sec => {
    const keys = Object.keys(sec.data);
    const primaryArr = sec.data[sec.primary];
    let sparkData = primaryArr;
    if (c.preContract && sec.primary !== 'Instagram' && (sec.title === 'Website Traffic' || sec.title === 'Lead Generation' || sec.title === 'Hours & Budget')) {
      sparkData = primaryArr.filter((v, i) => typeof v === 'number' ? v > 0 || i >= 2 : i >= 2);
      if (sparkData.length > 4) sparkData = primaryArr.slice(2);
    }
    const numericSparkData = sparkData.filter(v => typeof v === 'number');
    const sColor = numericSparkData.length > 1 ? sparkColor(numericSparkData) : '#555';

    // Build table
    let tableHTML = '<table class="data-table"><thead><tr><th>Metric</th>';
    MONTHS.forEach(m => tableHTML += `<th>${m}</th>`);
    tableHTML += '<th>MoM</th></tr></thead><tbody>';

    keys.forEach(key => {
      const arr = sec.data[key];
      tableHTML += '<tr><td style="font-weight:600">' + key + '</td>';
      for (let i = 0; i < 6; i++) {
        let val = arr[i];
        if (c.preContract && i < 2 && typeof val === 'number' && val === 0) {
          tableHTML += '<td>\u2014</td>';
        } else if (key === 'Revenue' || key === 'Budget' || key === 'Actual Cost' || key === 'CPL') {
          tableHTML += '<td>' + (typeof val === 'number' ? '$' + val.toLocaleString() : val) + '</td>';
        } else if (typeof val === 'number' && val >= 1000) {
          tableHTML += '<td>' + val.toLocaleString() + '</td>';
        } else {
          tableHTML += '<td>' + val + '</td>';
        }
      }
      const mom = momChange(arr);
      tableHTML += `<td class="${mom.cls}">${mom.text}</td></tr>`;
    });
    tableHTML += '</tbody></table>';

    return `<div class="detail-section">
      <h3>${sec.title}</h3>
      <div class="spark-large">${numericSparkData.length > 1 ? sparkline(numericSparkData, 200, 40, sColor) : ''}</div>
      ${tableHTML}
    </div>`;
  }).join('');

  dv.innerHTML = `
    <button class="back-btn" onclick="showOverview()">\u2190 Back to Overview</button>
    <div class="detail-header">
      <span class="detail-name">${c.name}</span>
      <span class="detail-retainer">${c.retainer}</span>
      <span class="detail-badge ${c.healthColor}">${c.health} ${healthEmoji(c.healthColor)}</span>
      <span class="card-trend ${trend.cls}" style="font-size:.9rem">${trend.text}</span>
    </div>
    ${sectionsHTML}
  `;
}

function showOverview() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('overview-view').style.display = 'block';
}

init();
</script>
