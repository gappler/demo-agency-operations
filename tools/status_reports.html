<head>
<meta charset="UTF-8">

<title>Status Reports — Sidebar Creative</title>
<style>
/* Reset & Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5;
  color: #222;
  min-width: 1100px;
}

/* Header */
.header {
  background: #1a1a1a;
  color: #fff;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: baseline; gap: 18px; }
.header-brand { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
.header-title { font-size: .95rem; font-weight: 400; color: #aaa; }
.header-date { font-size: .85rem; color: #777; }

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 18px 28px;
}
.stat-card {
  background: #fff;
  border-radius: 6px;
  padding: 16px 20px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; color: #777; margin-bottom: 4px; }
.stat-value { font-size: 1.6rem; font-weight: 700; }
.stat-value.red { color: #dc3545; }
.stat-value.green { color: #28a745; }
.stat-value.yellow { color: #ffc107; }
.stat-value.blue { color: #007bff; }

/* Two-panel layout */
.layout {
  display: flex;
  gap: 14px;
  padding: 0 28px 28px;
}

/* Selector Panel */
.selector-panel {
  flex: 0 0 300px;
  overflow-y: auto;
  max-height: calc(100vh - 180px);
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.rollup-item {
  background: #1a1a1a;
  color: #fff;
  padding: 12px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: border-color .15s;
}
.rollup-item:hover { background: #2a2a2a; }
.rollup-item.active { border-left-color: #007bff; }
.rollup-item .rollup-label { font-weight: 600; font-size: 13px; }
.rollup-item .rollup-sub { font-size: 11px; color: #999; margin-top: 2px; }

.section-label {
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: .06em;
  color: #888;
  padding: 8px 16px;
  background: #f5f5f5;
  border-bottom: 1px solid #eee;
}

.report-item {
  padding: 10px 16px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.report-item:hover { background: #fafafa; }
.report-item.active {
  background: #007bff08;
  border-left-color: #007bff;
}
.report-item-left { display: flex; align-items: center; gap: 8px; }
.report-item-name { font-weight: 500; font-size: 13px; }
.report-item-retainer { font-size: 11px; color: #888; }
.report-item-right { text-align: right; }
.report-item-health { font-size: 12px; font-weight: 600; }

.health-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  vertical-align: middle;
  flex-shrink: 0;
}

/* Viewer Panel */
.viewer-panel {
  flex: 1;
  overflow-y: auto;
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}

.report-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #eee;
}
.report-title { font-weight: 700; font-size: 16px; }
.copy-btn {
  background: #28a745;
  color: white;
  border: none;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
}
.copy-btn:hover { background: #218838; }
.copy-btn.copied { background: #28a745; }

.report-body { padding: 20px; line-height: 1.6; font-size: 13px; }
.report-meta { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.report-date { color: #888; font-size: 12px; }
.report-ad { color: #555; font-size: 12px; }

.report-section { margin-bottom: 20px; }
.report-section h3 {
  font-size: 14px;
  padding-bottom: 6px;
  border-bottom: 1px solid #eee;
  margin-bottom: 10px;
}
.report-section ul { margin: 0 0 0 20px; color: #444; }
.report-section li { margin-bottom: 6px; }

.report-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.report-table th {
  padding: 6px 10px;
  text-align: left;
  background: #f5f5f5;
  font-size: 11px;
  border-bottom: 1px solid #ddd;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: #555;
}
.report-table td { padding: 6px 10px; border-bottom: 1px solid #eee; }
.report-table tr:last-child td { border-bottom: none; }

.health-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 600;
}

.attention-client { margin-bottom: 16px; }
.attention-header { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }

.metrics-note { font-style: italic; color: #888; font-size: 12px; margin-bottom: 8px; }

.metric-change-up { color: #28a745; }
.metric-change-down { color: #dc3545; }
.metric-change-flat { color: #888; }

.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: #999;
  font-size: 13px;
}
</style>
</head>

        <div class="report-item-health" style="color:${dotColor}">${client.health}</div>
      </div>
    </div>`;
  });

  panel.innerHTML = html;
}

function renderViewer() {
  if (selectedReport === 'rollup') {
    renderRollup();
    return;
  }

  const client = CLIENTS.find(c => c.id === selectedReport);
  if (!client) {
    document.getElementById('viewerPanel').innerHTML = '<div class="empty-state">Select a report from the left panel.</div>';
    return;
  }

  const badgeBg = HEALTH_COLORS[client.status];
  const b = client.budget;

  // Budget row color
  let budgetColor = '#28a745';
  if (b.budgetStatus === 'Over budget') budgetColor = '#dc3545';
  else if (b.budgetStatus === 'Under budget') budgetColor = '#888';

  let html = `
    <div class="report-header">
      <div class="report-title">${client.name} — Weekly Status Report</div>
      <button class="copy-btn" onclick="copyReport('${client.id}')">Copy Markdown</button>
    </div>
    <div class="report-body">
      <div class="report-meta">
        <span class="report-date">${REPORT_DATE}</span>
        <span class="report-ad">Account Director: ${client.accountDirector}</span>
        <span class="health-badge" style="background:${badgeBg}22; color:${badgeBg}">
          ${STATUS_EMOJI[client.status]} Health: ${client.health}/100
        </span>
      </div>

      <div class="report-section">
        <h3>Progress This Week</h3>
        <ul>${client.progress.map(p => `<li>${p}</li>`).join('')}</ul>
      </div>

      <div class="report-section">
        <h3>Blockers &amp; Risks</h3>
        <ul>${client.blockers.map(b => `<li>${b}</li>`).join('')}</ul>
      </div>

      <div class="report-section">
        <h3>Next Steps</h3>
        <ul>${client.nextSteps.map(n => `<li>${n}</li>`).join('')}</ul>
      </div>

      <div class="report-section">
        <h3>Budget Health</h3>
        <table class="report-table">
          <thead>
            <tr>
              <th>SOW Hours</th>
              <th>Actual Hours</th>
              <th>Utilization</th>
              <th>Monthly Budget</th>
              <th>Actual Cost</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>${b.sowHours}</td>
              <td>${b.actualHours}</td>
              <td>${b.utilization}%</td>
              <td>${formatMoney(b.monthlyBudget)}</td>
              <td>${formatMoney(b.actualCost)}</td>
              <td style="color:${budgetColor}; font-weight:600">${b.budgetStatus}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="report-section">
        <h3>Key Metrics</h3>
        ${client.metricsNote ? `<div class="metrics-note">${client.metricsNote}</div>` : ''}
        <table class="report-table">
          <thead>
            <tr>
              <th>Metric</th>
              <th>Value</th>
              <th>MoM Change</th>
            </tr>
          </thead>
          <tbody>
            ${client.metrics.map(m => {
              let changeClass = 'metric-change-flat';
              if (m.direction === 'up') changeClass = 'metric-change-up';
              else if (m.direction === 'down') changeClass = 'metric-change-down';
              return `<tr>
                <td>${m.name}</td>
                <td>${m.value}</td>
                <td class="${changeClass}">${m.change}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('viewerPanel').innerHTML = html;
}

function renderRollup() {
  const r = ROLLUP;
  const ps = r.portfolioSummary;

  let html = `
    <div class="report-header">
      <div class="report-title">${r.title}</div>
      <button class="copy-btn" onclick="copyReport('rollup')">Copy Markdown</button>
    </div>
    <div class="report-body">
      <div class="report-meta">
        <span class="report-date">${r.date}</span>
        <span class="report-ad">Prepared for: ${r.preparedFor}</span>
      </div>

      <div class="report-section">
        <h3>Accounts Requiring Attention</h3>
        ${r.attentionClients.map(ac => {
          const badgeBg = HEALTH_COLORS[ac.status];
          return `<div class="attention-client">
            <div class="attention-header">
              <span class="health-badge" style="background:${badgeBg}22; color:${badgeBg}">
                ${STATUS_EMOJI[ac.status]} ${ac.name}
              </span>
              <span style="font-size:12px; color:#888">Health: ${ac.health}/100</span>
            </div>
            <ul style="margin:0 0 0 20px; color:#444">
              ${ac.highlights.map(h => `<li style="margin-bottom:4px">${h}</li>`).join('')}
            </ul>
          </div>`;
        }).join('')}
      </div>

      <div class="report-section">
        <h3>Accounts On Track</h3>
        <table class="report-table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Health</th>
              <th>Retainer</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            ${r.onTrackClients.map(oc => {
              const color = HEALTH_COLORS['green'];
              return `<tr>
                <td>${oc.name}</td>
                <td style="color:${color}; font-weight:600">${oc.health}</td>
                <td>${formatMoney(oc.retainer)}</td>

      <div class="report-section">

        <table class="report-table">
          <thead>
            <tr><th>Metric</th><th>Value</th></tr>
          </thead>
          <tbody>
            <tr><td>Total Monthly Retainer Revenue</td><td style="font-weight:600">${formatMoney(ps.totalRevenue)}</td></tr>
            <tr><td>Average Account Health Score</td><td style="font-weight:600">${ps.avgHealth}/100</td></tr>
            <tr><td>Blended SOW Utilization</td><td style="font-weight:600">${ps.blendedUtilization}%</td></tr>
            <tr><td>Green Accounts</td><td style="color:#28a745; font-weight:600">${ps.greenCount}</td></tr>
            <tr><td>Yellow Accounts</td><td style="color:#ffc107; font-weight:600">${ps.yellowCount}</td></tr>
            <tr><td>Red Accounts</td><td style="color:#dc3545; font-weight:600">${ps.redCount}</td></tr>
            <tr><td>Accounts Over SOW</td><td style="color:#dc3545">${ps.overSOW.join(', ')}</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('viewerPanel').innerHTML = html;
}

function updateStats() {
  const redCount = CLIENTS.filter(c => c.status === 'red').length;
  const yellowCount = CLIENTS.filter(c => c.status === 'yellow').length;
  const avgHealth = Math.round(CLIENTS.reduce((sum, c) => sum + c.health, 0) / CLIENTS.length);

  document.getElementById('statRed').textContent = redCount;
  document.getElementById('statYellow').textContent = yellowCount;
  const avgEl = document.getElementById('statAvgHealth');
  avgEl.textContent = avgHealth;
  if (avgHealth >= 80) avgEl.classList.add('green');
  else if (avgHealth >= 60) avgEl.classList.add('yellow');
  else avgEl.classList.add('red');
}

function selectReport(id) {
  selectedReport = id;
  renderSelector();
  renderViewer();
}

function copyReport(id) {
  let md = '';

  if (id === 'rollup') {
    const r = ROLLUP;
    const ps = r.portfolioSummary;
    md += `# ${r.title}\n\n`;
    md += `${r.date} · Prepared for: ${r.preparedFor}\n\n`;
    md += '## Accounts Requiring Attention\n\n';
    r.attentionClients.forEach(ac => {
      md += `### ${ac.name} — ${ac.health} ${STATUS_EMOJI[ac.status]}\n\n`;
      ac.highlights.forEach(h => { md += `- ${h}\n`; });
      md += '\n';
    });
    md += '## Accounts On Track\n\n';
    md += '| Client | Health | Retainer | Status Note |\n|--------|--------|----------|-------------|\n';
    r.onTrackClients.forEach(c => { md += `| ${c.name} | ${c.health} 🟢 | ${formatMoney(c.retainer)}/mo | ${c.note} |\n`; });
    md += '\n## Portfolio Summary\n\n';
    md += '| Metric | Value |\n|--------|-------|\n';
    md += `| Total Monthly Retainer Revenue | ${formatMoney(ps.totalRevenue)} |\n`;
    md += `| Average Health Score | ${ps.avgHealth} |\n`;
    md += `| Blended Utilization | ${ps.blendedUtilization}% |\n`;
    md += `| Account Status | ${ps.greenCount} 🟢 / ${ps.yellowCount} 🟡 / ${ps.redCount} 🔴 |\n`;
    md += `| Accounts Over SOW Hours | ${ps.overSOW.join(', ')} |\n`;
  } else {
    const client = CLIENTS.find(c => c.id === id);
    if (!client) return;
    const b = client.budget;
    md += `# ${client.name} — Weekly Status Report\n\n`;
    md += `${REPORT_DATE} · Account Director: ${client.accountDirector} · Health: ${client.health} ${STATUS_EMOJI[client.status]}\n\n`;
    md += '## Progress\n\n';
    client.progress.forEach(p => { md += `- ${p}\n`; });
    md += '\n## Blockers\n\n';
    client.blockers.forEach(bl => { md += `- ${bl}\n`; });
    md += '\n## Next Steps\n\n';
    client.nextSteps.forEach(n => { md += `- ${n}\n`; });
    md += '\n## Budget Health\n\n';
    md += '| Metric | SOW | Actual | Status |\n|--------|-----|--------|--------|\n';
    md += `| Monthly Hours | ${b.sowHours} | ${b.actualHours} | ${b.utilization}% |\n`;
    md += `| Monthly Budget | ${formatMoney(b.monthlyBudget)} | ${formatMoney(b.actualCost)} | ${b.budgetStatus} |\n`;
    md += '\n## Key Metrics (March 2026)\n\n';
    if (client.metricsNote) md += `*${client.metricsNote}*\n\n`;
    md += '| Metric | Value | MoM Change |\n|--------|-------|------------|\n';
    client.metrics.forEach(m => { md += `| ${m.name} | ${m.value} | ${m.change} |\n`; });
  }

  navigator.clipboard.writeText(md).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy Markdown';
        btn.classList.remove('copied');
      }, 2000);
    }
  }).catch(() => {
    alert('Could not copy to clipboard. Please copy manually.');
  });
}

// ---- Init ----
document.getElementById('headerDate').textContent = REPORT_DATE;
renderSelector();
renderViewer();
updateStats();
</script>
</body>
</html>
