  background: #fff;

.report-container table tr:nth-child(even) td {

.report-container ol li {

// --- Utilities ---

function fmtNum(v) {
  if (typeof v === 'string') return v;
  if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
  if (v >= 1000) return (v / 1000).toFixed(v >= 10000 ? 0 : 1) + 'K';
  return v.toLocaleString();
}

function fmtDollar(v) {
  if (v >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M';
  if (v >= 1000) return '$' + (v / 1000).toFixed(v >= 10000 ? 0 : 1) + 'K';
  return '$' + v.toLocaleString();
}

function fmtPct(curr, prev, invertColor) {
  if (prev === 0 || prev === undefined || prev === null) return { text: '\u2014', cls: 'mom-na' };
  const pct = ((curr - prev) / prev * 100).toFixed(1);
  const positive = pct > 0;
  const negative = pct < 0;
  let cls = 'mom-na';
  if (invertColor) {
    cls = positive ? 'mom-neg' : negative ? 'mom-pos' : 'mom-na';
  } else {
    cls = positive ? 'mom-pos' : negative ? 'mom-neg' : 'mom-na';
  }
  const sign = positive ? '+' : '';
  return { text: sign + pct + '%', cls };
}

function healthLabel(color) {
  if (color === 'green') return 'Healthy';
  if (color === 'yellow') return 'At Risk';
  return 'Critical';
}

function healthEmoji(color) {
  if (color === 'green') return '\uD83D\uDFE2';
  if (color === 'yellow') return '\uD83D\uDFE1';
  return '\uD83D\uDD34';
}

function generateTemplateSummary(client, mi) {
  const prevMi = mi - 1;
  // Count improved vs declined metrics
  let improved = 0, declined = 0;
  const checks = [
    { curr: client.traffic.Sessions[mi], prev: prevMi >= 0 ? client.traffic.Sessions[prevMi] : null },
    { curr: client.leads.MQLs[mi], prev: prevMi >= 0 ? client.leads.MQLs[prevMi] : null },
    { curr: client.email.Revenue[mi], prev: prevMi >= 0 ? client.email.Revenue[prevMi] : null },
    { curr: client.hours['Util %'][mi], prev: prevMi >= 0 ? client.hours['Util %'][prevMi] : null }
  ];
  checks.forEach(c => {
    if (c.prev && c.prev > 0) {
      if (c.curr > c.prev) improved++;
      else if (c.curr < c.prev) declined++;
    }
  });
  const tone = improved > declined ? 'strong' : improved === declined ? 'steady' : 'challenging';

  // Best metric
  let bestMetric = '', bestChange = -Infinity;
  let worstMetric = '', worstChange = Infinity;
  const metricNames = ['website traffic', 'lead generation', 'email revenue', 'utilization'];
  checks.forEach((c, i) => {
    if (c.prev && c.prev > 0) {
      const pct = (c.curr - c.prev) / c.prev * 100;
      if (pct > bestChange) { bestChange = pct; bestMetric = metricNames[i]; }
      if (pct < worstChange) { worstChange = pct; worstMetric = metricNames[i]; }
    }
  });

  const monthName = MONTHS[mi];
  const bestDir = bestChange > 0 ? 'up' : 'down';
  const bestPct = Math.abs(bestChange).toFixed(1);
  const worstDir = worstChange > 0 ? 'up' : 'down';
  const worstPct = Math.abs(worstChange).toFixed(1);

  let line2 = bestMetric ? `${bestMetric.charAt(0).toUpperCase() + bestMetric.slice(1)} was the strongest area, ${bestDir} ${bestPct}% month-over-month.` : '';
  let line3 = worstMetric && worstMetric !== bestMetric ? `${worstMetric.charAt(0).toUpperCase() + worstMetric.slice(1)} ${worstChange < 0 ? 'declined' : 'held steady'} and warrants attention.` : '';

  if (mi === 0) {
    return `${client.name} began the reporting period in ${monthName}. This is the first month of tracked data, establishing baseline metrics across all channels.`;
  }

  return `${client.name} had a ${tone} ${monthName.split(' ')[0]}. ${line2} ${line3}`.trim();
}

function generateTemplateRecs(client, mi) {
  const prevMi = mi - 1;
  const recs = [];

  if (prevMi < 0 || (client.preContract && prevMi < 2)) {
    return ["Establish baseline KPIs and set performance targets for next month.", "Review SOW deliverables to ensure alignment with client priorities.", "Schedule a strategy session to define Q1 goals."];
  }

  // 1. Biggest decline
  const metrics = [
    { name: 'website traffic', curr: client.traffic.Sessions[mi], prev: client.traffic.Sessions[prevMi] },
    { name: 'lead generation (MQLs)', curr: client.leads.MQLs[mi], prev: client.leads.MQLs[prevMi] },
    { name: 'email revenue', curr: client.email.Revenue[mi], prev: client.email.Revenue[prevMi] },
  ];
  let worstIdx = 0, worstPct = Infinity;
  metrics.forEach((m, i) => {
    if (m.prev > 0) {
      const pct = (m.curr - m.prev) / m.prev * 100;
      if (pct < worstPct) { worstPct = pct; worstIdx = i; }
    }
  });
  const worst = metrics[worstIdx];
  const wPct = Math.abs(((worst.curr - worst.prev) / worst.prev) * 100).toFixed(1);
  if (worstPct < 0) {
    recs.push(`Address the ${worst.name} decline \u2014 ${worst.name} dropped ${wPct}% this month and needs a focused recovery plan.`);
  } else {
    recs.push(`Maintain momentum in ${worst.name} \u2014 even the weakest channel showed growth this month. Identify opportunities to accelerate.`);
  }

  // 2. Hours vs SOW
  const util = client.hours['Util %'][mi];
  if (util > 105) {
    recs.push(`Address scope management \u2014 hours came in at ${util}% of SOW this month. Consider a change order or retainer adjustment to align capacity with demand.`);
  } else if (util < 90) {
    recs.push(`Improve capacity utilization \u2014 hours came in at ${util}% of SOW this month. Identify strategic initiatives to fill the available capacity and maximize value for the client.`);
  } else {
    recs.push(`Continue disciplined scope management \u2014 hours at ${util}% of SOW reflect healthy alignment between deliverables and capacity.`);
  }

  // 3. Strongest metric
  let bestIdx = 0, bestPct = -Infinity;
  metrics.forEach((m, i) => {
    if (m.prev > 0) {
      const pct = (m.curr - m.prev) / m.prev * 100;
      if (pct > bestPct) { bestPct = pct; bestIdx = i; }
    }
  });
  const best = metrics[bestIdx];
  const bPct = Math.abs(((best.curr - best.prev) / best.prev) * 100).toFixed(1);
  if (bestPct > 0) {
    recs.push(`Build on the ${best.name} momentum \u2014 ${best.name} grew ${bPct}% this month. Double down on the strategies driving this growth.`);
  } else {
    recs.push(`Conduct a comprehensive performance review \u2014 all tracked metrics declined this month. Schedule a strategy session to identify root causes and corrective actions.`);
  }

  return recs;
}

function buildMetricTable(sectionData, mi, priorHasData, invertKeys) {
  invertKeys = invertKeys || [];
  const keys = Object.keys(sectionData);
  let html = '<table><tr><th>Metric</th><th>' + MONTHS[mi] + '</th>';
  if (mi > 0) html += '<th>' + MONTHS[mi - 1] + '</th><th>MoM Change</th>';
  html += '</tr>';

  keys.forEach(key => {
    const curr = sectionData[key][mi];
    const prev = mi > 0 ? sectionData[key][mi - 1] : null;
    const isInvert = invertKeys.includes(key);

    let currDisplay = formatMetricValue(key, curr);
    let prevDisplay = '\u2014';
    let changeDisplay = { text: '\u2014', cls: 'mom-na' };

    if (mi > 0 && priorHasData) {
      prevDisplay = formatMetricValue(key, prev);
      if (typeof curr === 'number' && typeof prev === 'number' && prev > 0) {
        changeDisplay = fmtPct(curr, prev, isInvert);
      } else if (typeof curr === 'string' || typeof prev === 'string') {
        changeDisplay = { text: '\u2014', cls: 'mom-na' };
      }
    }

    html += '<tr><td>' + key + '</td><td>' + currDisplay + '</td>';
    if (mi > 0) {
      html += '<td>' + prevDisplay + '</td>';
      html += '<td class="' + changeDisplay.cls + '">' + changeDisplay.text + '</td>';
    }
    html += '</tr>';
  });

  html += '</table>';
  return html;
}

function formatMetricValue(key, val) {
  if (typeof val === 'string') return val;
  if (val === 0 && (key === 'Sessions' || key === 'Visitors' || key === 'MQLs' || key === 'SQLs')) return '\u2014';
  if (key.includes('Revenue') || key === 'Budget' || key === 'Actual Cost') return fmtDollar(val);
  if (key.includes('%')) return val.toFixed(1) + '%';
  if (key === 'CPL') return '$' + val.toFixed(2);
  return fmtNum(val);
}

function buildReportHTML(client, mi, month, summary, recs, priorHasData) {
  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  let html = '<div class="report-container">';

  // 1. Report Header
  html += '<div class="report-branding">Sidebar Creative</div>';
  html += '<h1>' + client.name + '</h1>';
  html += '<div class="report-subtitle">' + month + ' \u2014 Monthly Performance Report</div>';
  html += '<div class="health-badge ' + client.healthColor + '">Health Score: ' + client.health + ' \u2014 ' + healthLabel(client.healthColor) + '</div>';
  html += '<div class="report-meta">Account Director: ' + client.manager + ' &nbsp;|&nbsp; Generated: ' + today + '</div>';

  // 2. Executive Summary
  html += '<h2>Executive Summary</h2>';
  html += '<p>' + summary + '</p>';

  // 3. Performance Metrics
  html += '<h2>Performance Metrics</h2>';

  html += '<h3>Traffic</h3>';
  html += buildMetricTable(client.traffic, mi, priorHasData, ['Bounce %']);

  html += '<h3>Leads</h3>';
  html += buildMetricTable(client.leads, mi, priorHasData, ['CPL']);

  html += '<h3>Social</h3>';
  html += buildMetricTable(client.social, mi, priorHasData, []);

  html += '<h3>Email</h3>';
  html += buildMetricTable(client.email, mi, priorHasData, []);

  // 4. Deliverables & SOW
  html += '<h2>Deliverables & SOW</h2>';
  html += '<table><tr><th>Discipline</th><th>SOW Deliverables</th><th>Monthly Hours</th></tr>';
  let totalSowHours = 0;
  Object.entries(client.sow).forEach(([disc, info]) => {
    html += '<tr><td>' + disc + '</td><td>' + info.deliverables + '</td><td>' + info.hours + '</td></tr>';
    totalSowHours += info.hours;
  });
  html += '<tr style="font-weight:600;border-top:2px solid #ddd"><td>Total</td><td></td><td>' + totalSowHours + '</td></tr>';
  html += '</table>';

  // 5. Hours & Budget
  html += '<h2>Hours & Budget</h2>';
  const sowHrs = client.hours['SOW Hours'][mi];
  const actHrs = client.hours.Delivered[mi];
  const utilPct = client.hours['Util %'][mi];
  const budget = client.hours.Budget[mi];
  const actCost = client.hours['Actual Cost'][mi];
  const effRate = actHrs > 0 ? (actCost / actHrs).toFixed(2) : '0.00';

  html += '<table><tr><th>Metric</th><th>Value</th></tr>';
  html += '<tr><td>SOW Hours</td><td>' + sowHrs + '</td></tr>';
  html += '<tr><td>Actual Hours</td><td>' + actHrs + '</td></tr>';
  html += '<tr><td>Utilization</td><td>' + utilPct + '%</td></tr>';
  html += '<tr><td>Monthly Budget</td><td>' + fmtDollar(budget) + '</td></tr>';
  html += '<tr><td>Actual Cost</td><td>' + fmtDollar(actCost) + '</td></tr>';
  html += '<tr><td>Effective Rate</td><td>$' + effRate + '/hr</td></tr>';
  html += '</table>';

  // 6. Strategic Recommendations
  html += '<h2>Strategic Recommendations</h2>';
  html += '<ol>';
  recs.forEach(r => {
    html += '<li>' + r + '</li>';
  });
  html += '</ol>';

  html += '</div>';
  return html;
}

// --- Markdown Export ---

function exportMarkdown() {
  if (!lastReport) return;
  const { client, mi, month, summary, recs, priorHasData } = lastReport;
  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  let md = '';

  // Header
  md += '# ' + client.name + ' \u2014 ' + month + ' Monthly Performance Report\n\n';
  md += '**Sidebar Creative** | Account Director: ' + client.manager + ' | Generated: ' + today + '\n\n';
  md += 'Health Score: ' + client.health + ' ' + healthEmoji(client.healthColor) + ' ' + healthLabel(client.healthColor) + '\n\n';

  // Executive Summary
  md += '## Executive Summary\n\n';
  md += summary + '\n\n';

  // Performance Metrics
  md += '## Performance Metrics\n\n';

  md += '### Traffic\n\n';
  md += buildMetricTableMD(client.traffic, mi, priorHasData, ['Bounce %']);

  md += '### Leads\n\n';
  md += buildMetricTableMD(client.leads, mi, priorHasData, ['CPL']);

  md += '### Social\n\n';
  md += buildMetricTableMD(client.social, mi, priorHasData, []);

  md += '### Email\n\n';
  md += buildMetricTableMD(client.email, mi, priorHasData, []);

  // Deliverables & SOW
  md += '## Deliverables & SOW\n\n';
  md += '| Discipline | SOW Deliverables | Monthly Hours |\n';
  md += '| --- | --- | --- |\n';
  let totalSowHours = 0;
  Object.entries(client.sow).forEach(([disc, info]) => {
    md += '| ' + disc + ' | ' + info.deliverables + ' | ' + info.hours + ' |\n';
    totalSowHours += info.hours;
  });
  md += '| **Total** | | **' + totalSowHours + '** |\n\n';

  // Hours & Budget
  md += '## Hours & Budget\n\n';
  const sowHrs = client.hours['SOW Hours'][mi];
  const actHrs = client.hours.Delivered[mi];
  const utilPct = client.hours['Util %'][mi];
  const budget = client.hours.Budget[mi];
  const actCost = client.hours['Actual Cost'][mi];
  const effRate = actHrs > 0 ? (actCost / actHrs).toFixed(2) : '0.00';

  md += '| Metric | Value |\n';
  md += '| --- | --- |\n';
  md += '| SOW Hours | ' + sowHrs + ' |\n';
  md += '| Actual Hours | ' + actHrs + ' |\n';
  md += '| Utilization | ' + utilPct + '% |\n';
  md += '| Monthly Budget | ' + fmtDollar(budget) + ' |\n';
  md += '| Actual Cost | ' + fmtDollar(actCost) + ' |\n';
  md += '| Effective Rate | $' + effRate + '/hr |\n\n';

  // Strategic Recommendations
  md += '## Strategic Recommendations\n\n';
  recs.forEach((r, i) => {
    md += (i + 1) + '. ' + r + '\n';
  });

  navigator.clipboard.writeText(md).then(() => {
    const btn = document.getElementById('btn-export');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

function buildMetricTableMD(sectionData, mi, priorHasData, invertKeys) {
  invertKeys = invertKeys || [];
  const keys = Object.keys(sectionData);
  let md = '| Metric | ' + MONTHS[mi];
  if (mi > 0) md += ' | ' + MONTHS[mi - 1] + ' | MoM Change';
  md += ' |\n';
  md += '| ---';
  md += ' | ---';
  if (mi > 0) md += ' | --- | ---';
  md += ' |\n';

  keys.forEach(key => {
    const curr = sectionData[key][mi];
    const prev = mi > 0 ? sectionData[key][mi - 1] : null;
    const isInvert = invertKeys.includes(key);

    let currDisplay = formatMetricValue(key, curr);
    let prevDisplay = '\u2014';
    let changeText = '\u2014';

    if (mi > 0 && priorHasData) {
      prevDisplay = formatMetricValue(key, prev);
      if (typeof curr === 'number' && typeof prev === 'number' && prev > 0) {
        const info = fmtPct(curr, prev, isInvert);
        changeText = info.text;
      }
    }

    md += '| ' + key + ' | ' + currDisplay;
    if (mi > 0) md += ' | ' + prevDisplay + ' | ' + changeText;
    md += ' |\n';
  });
  md += '\n';
  return md;
}
